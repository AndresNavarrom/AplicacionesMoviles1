<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute position / landscape - Posicionamiento absoluto / paisaje</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Cargar Howler.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  </head>
    
  <body>
  <div id="paisaje">
    <img id="nube" class="objeto" src="https://icons.iconarchive.com/icons/flaticonmaker/flat-style/128/cloud-icon.png" alt="nube">
    <img id="bici" class="objeto" src="https://icons.iconarchive.com/icons/aha-soft/transport/128/bike-icon.png" alt="bicicleta" title="¡Haz clic para escuchar la campana!">
    <img id="arbol" class="objeto" src="https://icons.iconarchive.com/icons/google/noto-emoji-animals-nature/128/22330-deciduous-tree-icon.png" alt="árbol">
    <img id="sol" class="objeto" src="https://icons.iconarchive.com/icons/dapino/beach/128/sun-icon.png" alt="sol">
    <img id="nevado" class="objeto" src="https://icons.iconarchive.com/icons/google/noto-emoji-travel-places/512/42462-mountain-icon.png" alt="montaña">
    <img id="nevado2" class="objeto" src="https://icons.iconarchive.com/icons/google/noto-emoji-travel-places/512/42462-mountain-icon.png" alt="montaña 2">
    
    <!-- Botón para activar/desactivar sonido -->
    <button id="btn-sonido">🔇 Sonido OFF</button>
  </div>

  <!-- Script de sonidos -->
  <script src="./sonidos.js"></script>
  </body>
  
</html>
