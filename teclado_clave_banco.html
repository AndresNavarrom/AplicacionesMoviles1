<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
.pantalla{background:var(--surface-1);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:12px 20px;text-align:center;font-family:var(--font-mono);font-size:26px;letter-spacing:8px;color:var(--text-primary);min-height:52px;margin-bottom:16px;}
.mensaje{font-size:13px;color:var(--text-secondary);text-align:center;min-height:18px;margin-bottom:16px;}
.teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto;}
.tecla{background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:16px 0;font-size:20px;font-weight:500;color:var(--text-primary);cursor:pointer;transition:background 0.1s,transform 0.08s;user-select:none;text-align:center;}
.tecla:hover{background:var(--surface-1);}
.tecla:active{transform:scale(0.95);}
.tecla-borrar{font-size:14px;color:var(--text-danger);}
.tecla-ingresar{font-size:13px;color:var(--text-accent);font-weight:500;}
.tecla-vacia{visibility:hidden;}
.contenedor{max-width:300px;margin:0 auto;padding:1.5rem 0;}
.titulo{font-size:15px;font-weight:500;color:var(--text-secondary);text-align:center;margin-bottom:1rem;}
</style>

<h2 class="sr-only">Teclado virtual para ingreso de clave bancaria</h2>

<div class="contenedor">
  <p class="titulo"><i class="ti ti-lock" aria-hidden="true" style="margin-right:6px;font-size:16px;"></i>Ingreso de clave</p>

  <div class="pantalla" id="pantalla" aria-live="polite" aria-label="Campo de clave"></div>
  <div class="mensaje" id="mensaje">Ingrese su clave de 4 a 6 dígitos</div>

  <div class="teclado" role="group" aria-label="Teclado numérico">
  </div>
</div>

<script>
  // --- Variables del programa ---
  const LONGITUD_MINIMA = 4;   // mínimo de dígitos permitidos
  const LONGITUD_MAXIMA = 6;   // máximo de dígitos permitidos
  const SIMBOLO_OCULTO = '●';  // símbolo que representa cada dígito ingresado

  let claveIngresada = '';     // almacena la clave real (números)
  let intentosFallidos = 0;    // contador de intentos incorrectos
  const CLAVE_CORRECTA = '1234'; // en un sistema real esto no estaría en el cliente

  const pantalla = document.getElementById('pantalla');
  const mensaje  = document.getElementById('mensaje');
  const contenedorTeclado = document.querySelector('.teclado');

  // Genera el orden aleatorio de las teclas (medida de seguridad)
  function generarTeclasAleatorias() {
    const digitos = ['1','2','3','4','5','6','7','8','9','0'];
    // Mezcla aleatoria (Fisher-Yates)
    for (let i = digitos.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [digitos[i], digitos[j]] = [digitos[j], digitos[i]];
    }
    return digitos;
  }

  // Dibuja el teclado en la página
  function dibujarTeclado() {
    contenedorTeclado.innerHTML = '';
    const digitos = generarTeclasAleatorias();

    // Primeras 9 teclas numéricas
    digitos.slice(0, 9).forEach(digito => {
      const tecla = document.createElement('button');
      tecla.className = 'tecla';
      tecla.textContent = digito;
      tecla.setAttribute('aria-label', `Dígito ${digito}`);
      tecla.addEventListener('click', () => presionarDigito(digito));
      contenedorTeclado.appendChild(tecla);
    });

    // Fila final: Borrar | 0 | Ingresar
    const teclaVacia = document.createElement('button');
    teclaVacia.className = 'tecla tecla-borrar';
    teclaVacia.textContent = '⌫ Borrar';
    teclaVacia.setAttribute('aria-label', 'Borrar último dígito');
    teclaVacia.addEventListener('click', borrarUltimo);
    contenedorTeclado.appendChild(teclaVacia);

    const teclaUltima = document.createElement('button');
    teclaUltima.className = 'tecla';
    teclaUltima.textContent = digitos[9];
    teclaUltima.setAttribute('aria-label', `Dígito ${digitos[9]}`);
    teclaUltima.addEventListener('click', () => presionarDigito(digitos[9]));
    contenedorTeclado.appendChild(teclaUltima);

    const teclaIngresar = document.createElement('button');
    teclaIngresar.className = 'tecla tecla-ingresar';
    teclaIngresar.textContent = 'Ingresar';
    teclaIngresar.setAttribute('aria-label', 'Confirmar clave');
    teclaIngresar.addEventListener('click', validarClave);
    contenedorTeclado.appendChild(teclaIngresar);
  }

  // Actualiza la pantalla mostrando puntos en lugar de los dígitos reales
  function actualizarPantalla() {
    pantalla.textContent = SIMBOLO_OCULTO.repeat(claveIngresada.length);
  }

  // Agrega un dígito a la clave
  function presionarDigito(digito) {
    if (claveIngresada.length >= LONGITUD_MAXIMA) {
      mostrarMensaje(`Máximo ${LONGITUD_MAXIMA} dígitos`, 'advertencia');
      return;
    }
    claveIngresada += digito;
    actualizarPantalla();
    mostrarMensaje(`${claveIngresada.length} dígito(s) ingresado(s)`);
  }

  // Borra el último dígito ingresado
  function borrarUltimo() {
    if (claveIngresada.length === 0) return;
    claveIngresada = claveIngresada.slice(0, -1);
    actualizarPantalla();
    const cantidad = claveIngresada.length;
    mostrarMensaje(cantidad === 0 ? 'Ingrese su clave de 4 a 6 dígitos' : `${cantidad} dígito(s) ingresado(s)`);
  }

  // Valida si la clave ingresada es correcta
  function validarClave() {
    if (claveIngresada.length < LONGITUD_MINIMA) {
      mostrarMensaje(`Mínimo ${LONGITUD_MINIMA} dígitos requeridos`, 'error');
      return;
    }

    if (claveIngresada === CLAVE_CORRECTA) {
      // Clave correcta: acceso concedido
      pantalla.textContent = '✓';
      pantalla.style.color = 'var(--text-success)';
      mensaje.textContent = '¡Acceso concedido! Bienvenido.';
      mensaje.style.color = 'var(--text-success)';
      contenedorTeclado.style.opacity = '0.3';
      contenedorTeclado.style.pointerEvents = 'none';
      intentosFallidos = 0;
      setTimeout(reiniciar, 2500);
    } else {
      // Clave incorrecta: registrar intento fallido
      intentosFallidos++;
      claveIngresada = '';
      actualizarPantalla();
      dibujarTeclado(); // mezcla nuevamente las teclas por seguridad

      if (intentosFallidos >= 3) {
        // Bloqueo por demasiados intentos
        mostrarMensaje('Tarjeta bloqueada. Comuníquese con el banco.', 'error');
        contenedorTeclado.style.opacity = '0.3';
        contenedorTeclado.style.pointerEvents = 'none';
        pantalla.textContent = '✕';
        pantalla.style.color = 'var(--text-danger)';
      } else {
        mostrarMensaje(`Clave incorrecta. Intento ${intentosFallidos} de 3`, 'error');
      }
    }
  }

  // Muestra un mensaje de estado al usuario
  function mostrarMensaje(texto, tipo = 'normal') {
    mensaje.textContent = texto;
    const colores = { normal: 'var(--text-secondary)', error: 'var(--text-danger)', advertencia: 'var(--text-warning)' };
    mensaje.style.color = colores[tipo] || colores.normal;
  }

  // Reinicia el formulario a su estado inicial
  function reiniciar() {
    claveIngresada = '';
    intentosFallidos = 0;
    pantalla.textContent = '';
    pantalla.style.color = 'var(--text-primary)';
    mensaje.style.color = 'var(--text-secondary)';
    contenedorTeclado.style.opacity = '1';
    contenedorTeclado.style.pointerEvents = 'auto';
    mostrarMensaje('Ingrese su clave de 4 a 6 dígitos');
    dibujarTeclado();
  }

  // Inicia el programa
  dibujarTeclado();
</script>
